services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
        VITE_ENABLE_API_MOCKS: ${VITE_ENABLE_API_MOCKS:-true}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped
